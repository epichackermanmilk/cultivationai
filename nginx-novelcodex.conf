# /etc/nginx/sites-available/novelcodex
# NovelCodex nginx config — Cloudflare-aware, rate-limited

# ── Cloudflare IP ranges (trust CF for real visitor IP) ───────────────────────
geo $cloudflare_ip {
    default 0;
    # IPv4 ranges from https://www.cloudflare.com/ips-v4/
    103.21.244.0/22    1;
    103.22.200.0/22    1;
    103.31.4.0/22      1;
    104.16.0.0/13      1;
    104.24.0.0/14      1;
    108.162.192.0/18   1;
    131.0.72.0/22      1;
    141.101.64.0/18    1;
    162.158.0.0/15     1;
    172.64.0.0/13      1;
    173.245.48.0/20    1;
    188.114.96.0/20    1;
    190.93.240.0/20    1;
    197.234.240.0/22   1;
    198.41.128.0/17    1;
}

# Restore real IP when behind Cloudflare
map $cloudflare_ip $real_ip {
    1       $http_cf_connecting_ip;
    default $remote_addr;
}

# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $real_ip zone=general:10m rate=20r/s;
limit_req_zone $real_ip zone=api:10m     rate=30r/s;
limit_req_status 429;

# ── Server ────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name novelcodex.com www.novelcodex.com _;

    # Real-IP resolution from Cloudflare
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # Body size limit (generous for API calls)
    client_max_body_size 64k;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── API routes (higher rate limit, larger body) ────────────────────────────
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        client_max_body_size 16k;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $real_ip;
        proxy_set_header   X-Forwarded-For    $real_ip;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   CF-Connecting-IP   $http_cf_connecting_ip;
        proxy_read_timeout 120s;
    }

    # ── Static assets (unlimited, long-cached) ────────────────────────────────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Everything else ───────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         'upgrade';
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $real_ip;
        proxy_set_header   X-Forwarded-For    $real_ip;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   CF-Connecting-IP   $http_cf_connecting_ip;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
